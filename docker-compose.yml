services:
  banco:
    image: postgres:15-alpine
    container_name: meu_banco_local
    environment:
      POSTGRES_USER: usuario_banco
      POSTGRES_PASSWORD: senha_banco
      POSTGRES_DB: meu_banco
    ports:
      - "5432:5432"
    volumes:
      - dados_banco:/var/lib/postgresql/data
      - ./BancoDeDados/database/grandetabela.sql:/docker-entrypoint-initdb.d/01-grandetabela.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usuario_banco -d meu_banco"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./BackEnd
    container_name: meu_backend_local
    ports:
      - "8080:8080"
    depends_on:
      banco:
        condition: service_healthy
    volumes:
      - ./BackEnd:/app
    develop:
      watch:
        - action: rebuild
          path: ./BackEnd/src

  frontend:
    build:
      context: ./FrontEnd
    container_name: meu_frontend_local
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./FrontEnd:/usr/share/nginx/html

volumes:
  dados_banco:
